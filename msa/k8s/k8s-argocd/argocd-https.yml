
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argo-hanroro-click-tls
  namespace: argocd
spec:
  secretName: argo-hanroro-click-tls
  duration: 2160h0m0s #90day
  renewBefore: 360h0m0s #before 15day
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  commonName: argo.hanroro.click
  dnsNames:
  - argo.hanroro.click